<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品手册中心 PC 原型</title>
  <style>
    :root {
      --bg: #f6efe4;
      --panel: rgba(255, 251, 245, 0.88);
      --ink: #261712;
      --muted: #7c6255;
      --line: rgba(69, 38, 24, 0.12);
      --brand: #b53a1b;
      --brand-deep: #7f1f12;
      --accent: #e6a33f;
      --good: #287a58;
      --warn: #ca7e13;
      --shadow: 0 22px 60px rgba(76, 35, 14, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Source Han Sans SC", "Microsoft YaHei UI", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(230, 163, 63, 0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(181, 58, 27, 0.14), transparent 30%),
        linear-gradient(160deg, #f7f0e6 0%, #efe4d3 48%, #f8f2e8 100%);
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(92, 46, 26, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(92, 46, 26, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent 90%);
    }
    .shell {
      width: min(1440px, calc(100vw - 40px));
      margin: 20px auto;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
    }
    .sidebar, .stage, .preview {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.68);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .sidebar {
      border-radius: 30px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .brand-box {
      padding: 18px;
      border-radius: 24px;
      background: linear-gradient(145deg, #4d1f15, #a53218 70%, #d37228);
      color: #fff9f0;
    }
    .brand-kicker { font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; opacity: 0.76; }
    .brand-title { margin: 10px 0 8px; font-size: 30px; font-weight: 800; line-height: 1.05; }
    .brand-desc { margin: 0; font-size: 13px; line-height: 1.7; opacity: 0.9; }
    .step-list { display: grid; gap: 10px; }
    .step-card {
      width: 100%;
      text-align: left;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      cursor: pointer;
    }
    .step-card.active { background: linear-gradient(135deg, rgba(181, 58, 27, 0.14), rgba(230, 163, 63, 0.14)); border-color: rgba(181, 58, 27, 0.36); }
    .step-no {
      display: inline-flex;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      background: rgba(38, 23, 18, 0.08);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .step-card.active .step-no { background: var(--brand); color: white; }
    .step-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .step-desc, .mini, .panel-sub, .footer-note, .data-hint { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .data-hint { border-top: 1px solid var(--line); padding-top: 16px; display: grid; gap: 8px; }
    .stage {
      border-radius: 32px;
      padding: 20px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 16px;
      min-height: calc(100vh - 40px);
    }
    .topbar, .panel-header, .page-row, .inline-actions, .footer-actions, .select-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .headline h1 { margin: 0; font-size: 34px; line-height: 1.06; font-weight: 800; }
    .headline p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary { background: linear-gradient(135deg, var(--brand) 0%, #d7662e 100%); color: white; }
    .btn-secondary { background: rgba(38, 23, 18, 0.06); color: var(--ink); border: 1px solid rgba(38, 23, 18, 0.08); }
    .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .metric {
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 245, 234, 0.84));
      border: 1px solid rgba(69, 38, 24, 0.08);
    }
    .metric-label { font-size: 13px; color: var(--muted); }
    .metric-value { margin-top: 10px; font-size: 28px; font-weight: 800; }
    .main-grid { display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.9fr); gap: 16px; min-height: 0; }
    .panel, .preview {
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(69, 38, 24, 0.08);
      border-radius: 24px;
      padding: 18px;
      min-height: 0;
    }
    .panel-title { font-size: 18px; font-weight: 800; margin: 0; }
    .chips, .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip, .tag {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(69, 38, 24, 0.12);
      background: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      cursor: pointer;
    }
    .chip.active { background: rgba(181, 58, 27, 0.12); border-color: rgba(181, 58, 27, 0.28); color: var(--brand-deep); font-weight: 700; }
    .tag { font-size: 12px; font-weight: 700; color: var(--brand-deep); background: rgba(38, 23, 18, 0.06); }
    .card-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      max-height: 540px;
      overflow: auto;
      padding-right: 4px;
    }
    .product-card, .selected-item, .editor-card, .page-card, .slide-card, .ghost {
      border-radius: 20px;
      background: linear-gradient(180deg, #fffaf3, #fff6ed);
      border: 1px solid rgba(69, 38, 24, 0.09);
      padding: 14px;
    }
    .product-card.selected { outline: 2px solid rgba(181, 58, 27, 0.18); background: linear-gradient(180deg, #fff8ee, #fff0df); }
    .product-image {
      height: 180px;
      border-radius: 18px;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }
    .product-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(28, 15, 10, 0.46), transparent 60%);
    }
    .product-name { font-size: 17px; font-weight: 800; line-height: 1.4; }
    .meta-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; color: var(--muted); font-size: 13px; }
    .status-pill {
      position: absolute;
      right: 14px;
      top: 14px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 251, 247, 0.88);
      font-size: 12px;
      font-weight: 800;
    }
    .status-pill.ok { color: var(--good); }
    .status-pill.warn { color: var(--warn); }
    .select-btn {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(181, 58, 27, 0.22);
      background: rgba(181, 58, 27, 0.08);
      color: var(--brand-deep);
      font-weight: 800;
      cursor: pointer;
    }
    .select-btn.active { background: linear-gradient(135deg, var(--brand), #d3622e); color: white; border-color: transparent; }
    .selection-list, .editor-list, .page-list, .slide-list { display: grid; gap: 10px; max-height: 540px; overflow: auto; padding-right: 4px; }
    .selected-item strong, .editor-card strong, .page-card strong, .slide-card strong { display: block; margin-bottom: 6px; font-size: 15px; }
    .editor-card textarea, .editor-card input, .page-card select {
      width: 100%;
      border: 1px solid rgba(69, 38, 24, 0.12);
      border-radius: 14px;
      padding: 10px 12px;
      background: #fffdf9;
      color: var(--ink);
      font: inherit;
      resize: vertical;
    }
    .editor-card label { display: grid; gap: 6px; margin-top: 10px; font-size: 13px; color: var(--muted); }
    .page-index {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(181, 58, 27, 0.12);
      color: var(--brand-deep);
      font-weight: 800;
    }
    .ghost { border: 1px dashed rgba(69, 38, 24, 0.18); background: rgba(255, 251, 245, 0.5); }
    .preview { display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 12px; }
    .preview-stage {
      border-radius: 22px;
      background: linear-gradient(165deg, #3a1f17, #6c2417 44%, #df8b3a 100%);
      color: #fff8ee;
      min-height: 270px;
      padding: 22px;
      display: grid;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .preview-stage::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -60px;
      bottom: -60px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
    }
    .preview-kicker { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.78; }
    .preview-title { font-size: 30px; font-weight: 800; line-height: 1.1; max-width: 80%; }
    .preview-copy { max-width: 80%; line-height: 1.7; font-size: 14px; opacity: 0.94; }
    .preview-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .preview-pill { padding: 8px 12px; border-radius: 999px; background: rgba(255, 248, 238, 0.16); font-size: 12px; font-weight: 700; }
    @media (max-width: 1180px) {
      .shell { grid-template-columns: 1fr; }
      .stage { min-height: auto; }
      .main-grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .shell { width: min(100vw - 18px, 100%); margin: 9px auto; }
      .stage { padding: 16px; }
      .metrics, .card-list { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <section class="brand-box">
        <div class="brand-kicker">Product Brochure Flow</div>
        <div class="brand-title">商品手册<br />中心</div>
        <p class="brand-desc">标准库选品同步、手册扩展字段补充、模板编排、导出发布，一套流程完成 PC 工作台原型。</p>
      </section>
      <section class="step-list" id="stepList"></section>
      <section class="data-hint">
        <div><strong>数据来源</strong></div>
        <div>标准库字段：商品名称、口味、净含量、温层、渠道、价格、封面图。</div>
        <div>扩展字段：卖点、适用场景、开发原因、推荐等级、目录页文案。</div>
      </section>
    </aside>
    <main class="stage">
      <header class="topbar">
        <div class="headline">
          <h1 id="stageTitle">选择标准库商品并生成手册</h1>
          <p id="stageDesc">先筛选品牌、渠道与温层，再把目标商品加入本次手册。</p>
        </div>
        <div class="top-actions">
          <button class="btn btn-secondary" id="demoReset">恢复演示数据</button>
          <button class="btn btn-primary" id="nextTopBtn">进入下一步</button>
        </div>
      </header>
      <section class="metrics">
        <article class="metric"><div class="metric-label">已选商品</div><div class="metric-value" id="selectedCount">0</div></article>
        <article class="metric"><div class="metric-label">已补充卖点</div><div class="metric-value" id="filledCount">0</div></article>
        <article class="metric"><div class="metric-label">编排页数</div><div class="metric-value" id="pageCount">0</div></article>
        <article class="metric"><div class="metric-label">发布状态</div><div class="metric-value" id="publishStatus">草稿</div></article>
      </section>
      <section class="main-grid">
        <section class="panel" id="leftPanel"></section>
        <section class="preview" id="rightPreview"></section>
      </section>
      <footer class="footer-actions">
        <div class="footer-note" id="footerNote">演示路径：选品同步 -> 内容补充 -> 模板编排 -> 预览发布</div>
        <div class="inline-actions">
          <button class="btn btn-secondary" id="prevBtn">上一步</button>
          <button class="btn btn-primary" id="nextBtn">下一步</button>
        </div>
      </footer>
    </main>
  </div>
  <script>
    const steps = [
      { key: "select", title: "选品同步", desc: "从标准库筛选商品并加入手册快照。", stageTitle: "选择标准库商品并生成手册", stageDesc: "先筛选品牌、渠道与温层，再把目标商品加入本次手册。" },
      { key: "enrich", title: "内容补充", desc: "为商品补充卖点、场景、渠道建议。", stageTitle: "补充手册专属内容字段", stageDesc: "标准库字段只管基础信息，销售话术、推荐场景和包装卖点在这里维护。" },
      { key: "layout", title: "模板编排", desc: "按手册章节自动分页并支持调整顺序。", stageTitle: "选择模板并编排页面", stageDesc: "封面、目录、总览页、详情页统一生成，也可以微调页型和顺序。" },
      { key: "publish", title: "预览发布", desc: "导出 PDF、生成 H5 与移动端链接。", stageTitle: "预览发布并生成多端链接", stageDesc: "统一检查缺失字段、导出文件与分享链接，保证对外口径一致。" }
    ];

    const initialProducts = [
      { id: "TGX-200-LM", name: "无骨鸡爪 200g 尝鲜装", brand: "脱骨侠", channel: "线上", temp: "冷藏即食", taste: "酸辣柠檬", weight: "200g", shelfLife: "10天", price: "19.90", cover: "https://img.zhuoxi.group/c27623e34e25aa71de2ccc20bc1910ad4045dcd1436092ff202cceb703ccc8a6570.png", category: "无骨鸡爪", selected: true, selling: "轻量尝鲜，适合线上转化首单。", scene: "天猫、抖音直播、新客试吃", story: "做首购引流款，降低尝鲜门槛。", completeness: "ok" },
      { id: "TGX-72-PJ", name: "无骨鸡爪 72g 定量装", brand: "脱骨侠", channel: "常温休食", temp: "常温", taste: "泡椒", weight: "72g", shelfLife: "9个月", price: "9.90", cover: "https://img.zhuoxi.group/33fa894f4197e32a097a1d4ae85102f40dad21f9659938bed552618b8ec4f0d7260.png", category: "无骨鸡爪", selected: true, selling: "9.9元价格带，量贩和便利店都好推。", scene: "BC超、社区团购、社会便利", story: "聚焦休食场景，强调性价比和整支脱骨。", completeness: "ok" },
      { id: "TGX-208-HP", name: "虎皮凤爪 208g 盒装", brand: "脱骨侠", channel: "冻品休食", temp: "冷冻", taste: "香辣", weight: "208g", shelfLife: "9个月", price: "24.90", cover: "https://img.zhuoxi.group/c27623e34e25aa71de2ccc20bc1910ad4045dcd1436092ff202cceb703ccc8a6570.png", category: "虎皮凤爪", selected: false, selling: "", scene: "", story: "", completeness: "warn" },
      { id: "TGX-700-PAN", name: "无骨鸡爪拼盘 700g", brand: "脱骨侠", channel: "冻品休食", temp: "冷冻", taste: "香辣柠檬 / 藤椒麻辣", weight: "700g", shelfLife: "12个月", price: "59.90", cover: "https://img.zhuoxi.group/33fa894f4197e32a097a1d4ae85102f40dad21f9659938bed552618b8ec4f0d7260.png", category: "无骨鸡爪拼盘", selected: false, selling: "", scene: "", story: "", completeness: "warn" },
      { id: "TGX-25KG-CY", name: "无骨鸡爪商用装 2.5kg", brand: "脱骨侠", channel: "餐饮", temp: "冷冻", taste: "蒜香酸甜辣", weight: "2.5kg", shelfLife: "12个月", price: "128.00", cover: "https://img.zhuoxi.group/c27623e34e25aa71de2ccc20bc1910ad4045dcd1436092ff202cceb703ccc8a6570.png", category: "餐饮冷冻", selected: false, selling: "", scene: "", story: "", completeness: "warn" },
      { id: "YXM-500-SX", name: "无骨鸡爪 500g 罐装", brand: "忆小萌", channel: "线上", temp: "冷藏即食", taste: "蒜香重辣", weight: "500g", shelfLife: "10天", price: "29.90", cover: "https://img.zhuoxi.group/33fa894f4197e32a097a1d4ae85102f40dad21f9659938bed552618b8ec4f0d7260.png", category: "无骨鸡爪", selected: false, selling: "", scene: "", story: "", completeness: "warn" }
    ];

    let products = JSON.parse(JSON.stringify(initialProducts));
    let currentStep = 0;
    let filters = { brand: "全部", channel: "全部", temp: "全部" };
    let pages = [];
    let publishState = "草稿";

    const stepList = document.getElementById("stepList");
    const leftPanel = document.getElementById("leftPanel");
    const rightPreview = document.getElementById("rightPreview");
    const stageTitle = document.getElementById("stageTitle");
    const stageDesc = document.getElementById("stageDesc");
    const selectedCount = document.getElementById("selectedCount");
    const filledCount = document.getElementById("filledCount");
    const pageCount = document.getElementById("pageCount");
    const publishStatus = document.getElementById("publishStatus");
    const footerNote = document.getElementById("footerNote");

    function uniqueValues(key) { return ["全部", ...new Set(products.map(item => item[key]))]; }
    function getSelected() { return products.filter(item => item.selected); }
    function getFilled() { return getSelected().filter(item => item.selling && item.scene && item.story); }
    function ensurePages() {
      const selected = getSelected();
      pages = [
        { id: "cover", title: "封面页", template: "封面页", items: [] },
        { id: "catalog", title: "目录页", template: "目录页", items: [] },
        { id: "overview", title: "渠道总览", template: "SKU总览模板", items: selected.slice(0, 4).map(item => item.id) },
        { id: "detail", title: "重点商品详情", template: "渠道详情模板", items: selected.slice(0, 3).map(item => item.id) }
      ];
    }
    function renderSteps() {
      stepList.innerHTML = steps.map((step, index) => `
        <button class="step-card ${index === currentStep ? "active" : ""}" data-step="${index}">
          <div class="step-no">${index + 1}</div>
          <div class="step-title">${step.title}</div>
          <div class="step-desc">${step.desc}</div>
        </button>
      `).join("");
      [...stepList.querySelectorAll(".step-card")].forEach(button => {
        button.addEventListener("click", () => { currentStep = Number(button.dataset.step); render(); });
      });
    }
    function renderMetrics() {
      ensurePages();
      selectedCount.textContent = getSelected().length;
      filledCount.textContent = getFilled().length;
      pageCount.textContent = pages.length;
      publishStatus.textContent = publishState;
    }
    function renderFilterChips(label, key) {
      return `
        <div>
          <div class="mini" style="margin-bottom:8px;">${label}</div>
          <div class="chips">
            ${uniqueValues(key).map(value => `<button class="chip ${filters[key] === value ? "active" : ""}" data-filter-key="${key}" data-filter-value="${value}">${value}</button>`).join("")}
          </div>
        </div>
      `;
    }
    function bindFilterEvents() {
      [...leftPanel.querySelectorAll("[data-filter-key]")].forEach(button => {
        button.addEventListener("click", () => { filters[button.dataset.filterKey] = button.dataset.filterValue; render(); });
      });
    }
    function bindSelectButtons() {
      [...leftPanel.querySelectorAll(".select-btn")].forEach(button => {
        button.addEventListener("click", () => {
          const item = products.find(product => product.id === button.dataset.id);
          item.selected = !item.selected;
          render();
        });
      });
    }
    function renderSelectStep() {
      const filteredProducts = products.filter(item => {
        const brandPass = filters.brand === "全部" || item.brand === filters.brand;
        const channelPass = filters.channel === "全部" || item.channel === filters.channel;
        const tempPass = filters.temp === "全部" || item.temp === filters.temp;
        return brandPass && channelPass && tempPass;
      });
      leftPanel.innerHTML = `
        <div class="panel-header"><div><h3 class="panel-title">标准库选品</h3><div class="panel-sub">按品牌、渠道和温层筛选，再把 SKU 同步成手册快照。</div></div></div>
        <div style="display:grid; gap:14px; margin-bottom:16px;">
          ${renderFilterChips("品牌", "brand")}
          ${renderFilterChips("渠道", "channel")}
          ${renderFilterChips("温层", "temp")}
        </div>
        <div class="card-list">
          ${filteredProducts.map(item => `
            <article class="product-card ${item.selected ? "selected" : ""}" style="position:relative;">
              <div class="status-pill ${item.completeness}">${item.completeness === "ok" ? "字段完整" : "待补充"}</div>
              <div class="product-image" style="background-image:url('${item.cover}')"></div>
              <div class="tag-row"><span class="tag">${item.brand}</span><span class="tag">${item.channel}</span><span class="tag">${item.temp}</span></div>
              <div class="product-name">${item.name}</div>
              <div class="meta-grid">
                <div>口味：${item.taste}</div><div>净含量：${item.weight}</div>
                <div>保质期：${item.shelfLife}</div><div>建议价：￥${item.price}</div>
              </div>
              <div class="select-row">
                <div class="mini">标准库编码：${item.id}</div>
                <button class="select-btn ${item.selected ? "active" : ""}" data-id="${item.id}">${item.selected ? "已加入手册" : "加入手册"}</button>
              </div>
            </article>
          `).join("")}
        </div>
      `;
      rightPreview.innerHTML = `
        <div class="panel-header"><div><h3 class="panel-title">手册快照篮</h3><div class="panel-sub">加入后会锁定一份展示快照，后续可单独编辑销售内容。</div></div></div>
        <div class="selection-list">
          ${getSelected().length ? getSelected().map(item => `
            <article class="selected-item">
              <strong>${item.name}</strong>
              <div class="mini">渠道：${item.channel} · 温层：${item.temp} · 规格：${item.weight}</div>
              <div class="tag-row" style="margin-top:10px;"><span class="tag">${item.taste}</span><span class="tag">售价 ￥${item.price}</span></div>
            </article>`).join("") : `<div class="ghost">还没有加入商品。左侧点“加入手册”后，这里会生成快照。</div>`}
        </div>
      `;
      bindFilterEvents();
      bindSelectButtons();
    }
    function renderEnrichStep() {
      const selected = getSelected();
      leftPanel.innerHTML = `
        <div class="panel-header"><div><h3 class="panel-title">手册扩展字段</h3><div class="panel-sub">这些内容不会直接来自标准库，主要服务销售讲解和渠道推荐。</div></div></div>
        <div class="editor-list">
          ${selected.length ? selected.map(item => `
            <article class="editor-card">
              <strong>${item.name}</strong>
              <div class="mini">标准字段：${item.channel} · ${item.temp} · ${item.weight} · ${item.taste}</div>
              <label>商品卖点<textarea rows="2" data-field="selling" data-id="${item.id}">${item.selling}</textarea></label>
              <label>销售适用场景<input value="${item.scene}" data-field="scene" data-id="${item.id}" /></label>
              <label>产品开发原因与特性<textarea rows="3" data-field="story" data-id="${item.id}">${item.story}</textarea></label>
            </article>`).join("") : `<div class="ghost">请先在上一步选择至少一个商品。</div>`}
        </div>
      `;
      rightPreview.innerHTML = `
        <div class="panel-header"><div><h3 class="panel-title">字段完整度检查</h3><div class="panel-sub">系统会把缺字段商品标记出来，避免发布时出现空白说明。</div></div></div>
        <div class="selection-list">
          ${selected.map(item => {
            const ready = item.selling && item.scene && item.story;
            return `<article class="selected-item"><strong>${item.name}</strong><div class="mini">${ready ? "可进入编排" : "还需补充文案字段"}</div><div class="tag-row" style="margin-top:10px;"><span class="tag">${item.selling ? "卖点已填" : "缺卖点"}</span><span class="tag">${item.scene ? "场景已填" : "缺场景"}</span><span class="tag">${item.story ? "特性已填" : "缺开发原因"}</span></div></article>`;
          }).join("")}
        </div>
      `;
      [...leftPanel.querySelectorAll("[data-field]")].forEach(field => {
        field.addEventListener("input", () => {
          const target = products.find(item => item.id === field.dataset.id);
          target[field.dataset.field] = field.value;
          target.completeness = target.selling && target.scene && target.story ? "ok" : "warn";
          renderMetrics();
          renderEnrichStep();
        });
      });
    }
    function renderLayoutStep() {
      ensurePages();
      leftPanel.innerHTML = `
        <div class="panel-header"><div><h3 class="panel-title">页面编排</h3><div class="panel-sub">按默认模板自动排出章节页，也支持替换页型和调整先后顺序。</div></div></div>
        <div class="page-list">
          ${pages.map((page, index) => `
            <article class="page-card">
              <div class="page-row">
                <div class="page-index">${index + 1}</div>
                <div><strong>${page.title}</strong><div class="mini">${page.items.length ? `包含 ${page.items.length} 个商品模块` : "章节/结构页"}</div></div>
              </div>
              <label style="margin-top:12px;">页面模板
                <select data-template-id="${page.id}">
                  ${["封面页", "目录页", "SKU总览模板", "渠道详情模板", "完整详情模板"].map(option => `<option value="${option}" ${page.template === option ? "selected" : ""}>${option}</option>`).join("")}
                </select>
              </label>
              <div class="inline-actions" style="margin-top:12px;">
                <button class="btn btn-secondary" data-move="up" data-page="${page.id}">上移</button>
                <button class="btn btn-secondary" data-move="down" data-page="${page.id}">下移</button>
              </div>
            </article>`).join("")}
        </div>
      `;
      const selected = getSelected();
      rightPreview.innerHTML = `
        <div class="panel-header"><div><h3 class="panel-title">版式预览</h3><div class="panel-sub">当前演示的是手册中“重点商品详情”页面。</div></div></div>
        <div class="preview-stage">
          <div class="preview-kicker">Offline Channels / Key SKU</div>
          <div class="preview-title">重点商品详情页自动生成</div>
          <div class="preview-copy">根据所选页型自动组合商品图、规格、口味、保质期、场景和卖点，导出时保持一致版式。</div>
          <div class="preview-pills">
            <span class="preview-pill">${selected[0] ? selected[0].name : "请选择商品"}</span>
            <span class="preview-pill">${selected[1] ? selected[1].name : "可展示第二商品"}</span>
            <span class="preview-pill">${selected[2] ? selected[2].name : "可展示第三商品"}</span>
          </div>
        </div>
        <div class="slide-list">
          ${selected.slice(0, 3).map(item => `<article class="slide-card"><strong>${item.name}</strong><div class="mini">规格 ${item.weight} · ${item.taste} · 保质期 ${item.shelfLife}</div><div style="margin-top:8px; line-height:1.7;">${item.selling || "待补充卖点"}<br />${item.scene || "待补充销售适用场景"}</div></article>`).join("")}
        </div>
      `;
      [...leftPanel.querySelectorAll("[data-template-id]")].forEach(select => {
        select.addEventListener("change", () => {
          const page = pages.find(item => item.id === select.dataset.templateId);
          page.template = select.value;
          renderLayoutStep();
        });
      });
      [...leftPanel.querySelectorAll("[data-move]")].forEach(button => {
        button.addEventListener("click", () => {
          const index = pages.findIndex(item => item.id === button.dataset.page);
          const target = button.dataset.move === "up" ? index - 1 : index + 1;
          if (target < 0 || target >= pages.length) return;
          [pages[index], pages[target]] = [pages[target], pages[index]];
          renderLayoutStep();
          renderMetrics();
        });
      });
    }
    function renderPublishStep() {
      const missing = getSelected().filter(item => !(item.selling && item.scene && item.story));
      rightPreview.innerHTML = `
        <div class="panel-header"><div><h3 class="panel-title">成品效果</h3><div class="panel-sub">这一步统一输出 PC 版、移动版和导出文件。</div></div></div>
        <div class="preview-stage">
          <div class="preview-kicker">Generated Output</div>
          <div class="preview-title">脱骨侠 2026 渠道商品手册</div>
          <div class="preview-copy">系统会基于页面模板生成 PDF 与移动端 H5 浏览链接，并记录当前发布版本。</div>
          <div class="preview-pills"><span class="preview-pill">PDF 导出</span><span class="preview-pill">H5 分享</span><span class="preview-pill">小程序查看</span></div>
        </div>
        <div class="slide-list">
          <article class="slide-card"><strong>发布摘要</strong><div class="mini">版本 V1.0 · 商品 ${getSelected().length} 个 · 页面 ${pages.length} 页</div></article>
          <article class="slide-card"><strong>当前状态</strong><div class="mini">${missing.length ? `仍有 ${missing.length} 个商品缺少扩展字段` : "字段完整，可正式发布"}</div></article>
        </div>
      `;
      leftPanel.innerHTML = `
        <div class="panel-header"><div><h3 class="panel-title">发布检查</h3><div class="panel-sub">发布前统一做字段、模板、链接与导出检查。</div></div></div>
        <div class="selection-list">
          <article class="selected-item"><strong>1. 字段完整度</strong><div class="mini">${missing.length ? "还有未补全的销售字段" : "全部商品已补充卖点、场景和开发原因"}</div></article>
          <article class="selected-item"><strong>2. 模板检查</strong><div class="mini">封面、目录、总览、详情页模板已生成，可继续导出 PDF。</div></article>
          <article class="selected-item"><strong>3. 多端输出</strong><div class="mini">生成 PC 查看页、移动端 H5、小程序分享二维码。</div></article>
          <article class="selected-item"><strong>4. 操作</strong><div class="inline-actions" style="margin-top:10px;"><button class="btn btn-secondary" id="saveDraftBtn">保存草稿</button><button class="btn btn-primary" id="publishBtn" ${missing.length ? "disabled style='opacity:.55;cursor:not-allowed;'" : ""}>正式发布</button></div></article>
        </div>
      `;
      document.getElementById("saveDraftBtn").addEventListener("click", () => { publishState = "草稿已保存"; render(); });
      const publishBtn = document.getElementById("publishBtn");
      if (publishBtn) publishBtn.addEventListener("click", () => { publishState = "已发布"; render(); });
    }
    function renderCurrentStep() {
      const step = steps[currentStep];
      stageTitle.textContent = step.stageTitle;
      stageDesc.textContent = step.stageDesc;
      if (step.key === "select") renderSelectStep();
      if (step.key === "enrich") renderEnrichStep();
      if (step.key === "layout") renderLayoutStep();
      if (step.key === "publish") renderPublishStep();
    }
    function render() {
      renderSteps();
      renderMetrics();
      renderCurrentStep();
      footerNote.textContent = `当前步骤：${steps[currentStep].title}`;
      document.getElementById("prevBtn").disabled = currentStep === 0;
      document.getElementById("nextBtn").disabled = currentStep === steps.length - 1;
      document.getElementById("nextTopBtn").disabled = currentStep === steps.length - 1;
    }
    document.getElementById("prevBtn").addEventListener("click", () => { if (currentStep > 0) currentStep -= 1; render(); });
    document.getElementById("nextBtn").addEventListener("click", () => { if (currentStep < steps.length - 1) currentStep += 1; render(); });
    document.getElementById("nextTopBtn").addEventListener("click", () => { if (currentStep < steps.length - 1) currentStep += 1; render(); });
    document.getElementById("demoReset").addEventListener("click", () => {
      products = JSON.parse(JSON.stringify(initialProducts));
      filters = { brand: "全部", channel: "全部", temp: "全部" };
      currentStep = 0;
      publishState = "草稿";
      render();
    });
    render();
  </script>
</body>
</html>
