<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品手册小程序预览</title>
  <style>
    :root {
      --card: rgba(255, 249, 241, 0.94);
      --ink: #241611;
      --muted: #87695c;
      --brand: #b53a1b;
      --brand-dark: #7b2113;
      --line: rgba(68, 34, 20, 0.12);
      --shadow: 0 24px 48px rgba(61, 30, 16, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Source Han Sans SC", "Microsoft YaHei UI", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top center, rgba(216, 157, 72, 0.28), transparent 32%),
        linear-gradient(180deg, #efe4d5 0%, #f8f2e7 100%);
      color: var(--ink);
    }
    .canvas {
      width: min(1220px, calc(100vw - 30px));
      display: grid;
      grid-template-columns: 300px 430px 1fr;
      gap: 22px;
      align-items: start;
      margin: 18px auto;
    }
    .guide, .phone, .insight {
      background: rgba(255, 251, 246, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      border-radius: 30px;
    }
    .guide, .insight { padding: 22px; }
    .guide-title, .insight h3 { margin: 0; font-size: 22px; font-weight: 800; }
    .guide-desc, .insight p { color: var(--muted); line-height: 1.8; font-size: 14px; }
    .route-list { display: grid; gap: 10px; margin-top: 18px; }
    .route-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      border-radius: 20px;
      padding: 14px;
      cursor: pointer;
    }
    .route-btn.active { background: linear-gradient(135deg, rgba(181, 58, 27, 0.14), rgba(216, 157, 72, 0.14)); border-color: rgba(181, 58, 27, 0.26); }
    .route-no {
      display: inline-flex;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      background: rgba(36, 22, 17, 0.08);
      font-weight: 800;
      margin-bottom: 8px;
    }
    .route-btn.active .route-no { background: var(--brand); color: white; }
    .route-name { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
    .route-copy { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .phone { padding: 18px 16px 20px; background: linear-gradient(180deg, #25140f, #3d1f16); }
    .phone-frame {
      width: 100%;
      max-width: 390px;
      height: 844px;
      margin: 0 auto;
      background: linear-gradient(180deg, #fbf5ec, #f6eee2);
      border-radius: 38px;
      overflow: hidden;
      position: relative;
      border: 6px solid #0e0908;
    }
    .notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 28px;
      border-radius: 0 0 18px 18px;
      background: #0e0908;
      z-index: 30;
    }
    .screen {
      height: 100%;
      padding: 44px 0 84px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .wx-bar {
      padding: 0 18px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }
    .capsule {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(36, 22, 17, 0.06);
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }
    .view { display: none; padding: 0 18px; overflow: auto; gap: 14px; flex: 1; }
    .view.active { display: grid; }
    .hero {
      padding: 22px;
      border-radius: 28px;
      color: #fff8ef;
      background: linear-gradient(160deg, #4f1f15, #ad3519 62%, #df8838);
      position: relative;
      overflow: hidden;
      min-height: 210px;
    }
    .hero::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -50px;
      bottom: -40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
    }
    .hero small { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.78; }
    .hero h1 { margin: 12px 0 8px; font-size: 34px; line-height: 1.04; }
    .hero p { margin: 0; font-size: 14px; line-height: 1.7; max-width: 78%; opacity: 0.92; }
    .quick-grid, .info-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .mini-card, .section-card, .product-card, .detail-card, .share-card {
      border-radius: 22px;
      background: var(--card);
      border: 1px solid var(--line);
      padding: 16px;
    }
    .mini-card strong, .section-card strong, .product-card strong, .detail-card strong, .share-card strong { display: block; font-size: 16px; margin-bottom: 6px; }
    .mini-card span, .section-card span, .product-card span, .detail-card span, .share-card span { color: var(--muted); font-size: 13px; line-height: 1.7; }
    .section-list, .product-list, .share-actions { display: grid; gap: 12px; }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .badge, .tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(181, 58, 27, 0.12);
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 800;
    }
    .chips, .tag-row, .flow-nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      cursor: pointer;
    }
    .chip.active { background: rgba(181, 58, 27, 0.14); border-color: rgba(181, 58, 27, 0.22); color: var(--brand-dark); font-weight: 800; }
    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      color: var(--muted);
    }
    .product-card { display: grid; grid-template-columns: 88px minmax(0, 1fr); gap: 12px; cursor: pointer; }
    .product-thumb, .detail-cover {
      background-size: cover;
      background-position: center;
    }
    .product-thumb { width: 88px; height: 88px; border-radius: 18px; }
    .product-meta { display: grid; gap: 7px; }
    .detail-cover { height: 182px; border-radius: 24px; }
    .detail-title { font-size: 24px; line-height: 1.2; font-weight: 800; margin: 0; }
    .detail-copy { color: var(--muted); line-height: 1.8; font-size: 14px; }
    .info-item {
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(68, 34, 20, 0.08);
    }
    .info-item small { display: block; color: var(--muted); margin-bottom: 5px; font-size: 12px; }
    .share-banner {
      border-radius: 24px;
      padding: 20px;
      color: #fff8ee;
      background: linear-gradient(160deg, #6b2417, #b63a1b 58%, #df8838);
    }
    .action-btn {
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      font-weight: 800;
      cursor: pointer;
      text-align: left;
    }
    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 76px;
      background: rgba(255, 249, 241, 0.96);
      border-top: 1px solid rgba(68, 34, 20, 0.1);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      z-index: 20;
    }
    .tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding-top: 8px;
      gap: 4px;
    }
    .tab.active { color: var(--brand-dark); font-weight: 800; }
    .flow-nav button {
      border: 0;
      border-radius: 999px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 800;
    }
    .flow-nav .main { background: linear-gradient(135deg, var(--brand), #d2632c); color: white; }
    .flow-nav .sub { background: rgba(36, 22, 17, 0.06); color: var(--ink); }
    @media (max-width: 1120px) {
      .canvas { grid-template-columns: 1fr; }
      .phone-frame { margin: 0 auto; }
    }
  </style>
</head>
<body>
  <div class="canvas">
    <section class="guide">
      <h2 class="guide-title">小程序浏览流程</h2>
      <p class="guide-desc">这版原型模拟销售在微信小程序里查看商品手册的路径：进入首页，打开手册，筛选商品，查看详情，再分享给客户。</p>
      <div class="route-list" id="routeList"></div>
      <div class="flow-nav">
        <button class="main" id="playFlow">按流程演示</button>
        <button class="sub" id="resetFlow">重置</button>
      </div>
    </section>
    <section class="phone">
      <div class="phone-frame">
        <div class="notch"></div>
        <div class="screen">
          <div class="wx-bar">
            <div>12:26</div>
            <div class="capsule">商品手册小程序 · 预览版</div>
          </div>
          <section class="view active" id="view-home"></section>
          <section class="view" id="view-manual"></section>
          <section class="view" id="view-products"></section>
          <section class="view" id="view-detail"></section>
          <section class="view" id="view-share"></section>
          <nav class="tabbar" id="tabbar">
            <button class="tab active" data-view="home"><div>🏠</div><div>首页</div></button>
            <button class="tab" data-view="manual"><div>📘</div><div>手册</div></button>
            <button class="tab" data-view="products"><div>🧺</div><div>商品</div></button>
            <button class="tab" data-view="share"><div>🔗</div><div>分享</div></button>
          </nav>
        </div>
      </div>
    </section>
    <section class="insight">
      <h3 id="insightTitle">首页</h3>
      <p id="insightCopy">先看到最新发布的商品手册，支持按渠道快速进入。</p>
      <div class="share-card" id="insightCard">
        <strong>当前动作</strong>
        <span>点击左侧步骤或底部 Tab，可切换不同浏览场景。</span>
      </div>
    </section>
  </div>
  <script>
    const routes = [
      { key: "home", title: "首页", desc: "查看最新发布手册与快捷入口。", insight: "首页承载品牌封面、最新手册、渠道入口和近期热卖 SKU。" },
      { key: "manual", title: "手册目录", desc: "进入某一本手册后，按章节浏览。", insight: "目录页适合客户现场演示，先看结构再进入具体章节。" },
      { key: "products", title: "商品列表", desc: "按渠道、温层、口味筛选目标商品。", insight: "商品列表主打快速检索，支持销售现场秒切换。" },
      { key: "detail", title: "商品详情", desc: "展示卖点、规格、适用场景和图片。", insight: "详情页承接销售讲解话术，同时保留标准字段和扩展字段。" },
      { key: "share", title: "分享页", desc: "生成链接和二维码发给客户。", insight: "分享页区分整本手册和单商品页两类分享方式。" }
    ];
    const products = [
      { id: "72g", name: "无骨鸡爪 72g 定量装", cover: "https://img.zhuoxi.group/33fa894f4197e32a097a1d4ae85102f40dad21f9659938bed552618b8ec4f0d7260.png", tag1: "常温休食", tag2: "泡椒", spec: "72g", price: "9.90", selling: "9.9元价格带，适合便利店、社区团购和休食货架。", scene: "BC超 / 社会便利 / 社区团购", story: "面向入门价格带，强调整支脱骨、即开即食、易陈列。", shelfLife: "9个月" },
      { id: "208g", name: "虎皮凤爪 208g 盒装", cover: "https://img.zhuoxi.group/c27623e34e25aa71de2ccc20bc1910ad4045dcd1436092ff202cceb703ccc8a6570.png", tag1: "冻品休食", tag2: "香辣", spec: "208g", price: "24.90", selling: "先炸后卤，肉厚筋多，适合冻品零售和量贩。", scene: "BC超 / 水果 / 即时新零售", story: "定位更高客单尝鲜需求，适合做视觉陈列主推款。", shelfLife: "9个月" },
      { id: "2.5kg", name: "无骨鸡爪商用装 2.5kg", cover: "https://img.zhuoxi.group/33fa894f4197e32a097a1d4ae85102f40dad21f9659938bed552618b8ec4f0d7260.png", tag1: "餐饮冷冻", tag2: "蒜香酸甜辣", spec: "2.5kg", price: "128.00", selling: "适合餐饮门店批量出品，稳定复购。", scene: "火锅店 / 卤味店 / 烧烤店", story: "强调标准化供货和大包装出餐效率。", shelfLife: "12个月" }
    ];

    let activeRoute = "home";
    let activeFilter = "全部";
    let detailProduct = products[0];
    let timer = null;

    const routeList = document.getElementById("routeList");
    const insightTitle = document.getElementById("insightTitle");
    const insightCopy = document.getElementById("insightCopy");
    const insightCard = document.getElementById("insightCard");

    function renderRoutes() {
      routeList.innerHTML = routes.map((route, index) => `
        <button class="route-btn ${route.key === activeRoute ? "active" : ""}" data-route="${route.key}">
          <div class="route-no">${index + 1}</div>
          <div class="route-name">${route.title}</div>
          <div class="route-copy">${route.desc}</div>
        </button>
      `).join("");
      [...routeList.querySelectorAll(".route-btn")].forEach(button => {
        button.addEventListener("click", () => switchView(button.dataset.route));
      });
    }

    function renderHome() {
      document.getElementById("view-home").innerHTML = `
        <section class="hero"><small>Boneless Product Brochure</small><h1>脱骨侠<br />商品手册</h1><p>支持按渠道查看商品、现场讲解、转发客户，一套内容同步到销售移动端。</p></section>
        <section class="quick-grid">
          <article class="mini-card"><strong>线下渠道手册</strong><span>28 个重点 SKU，按渠道推荐场景展示。</span></article>
          <article class="mini-card"><strong>线上渠道手册</strong><span>尝鲜装、罐装、拼盘等适合直播和电商的商品集合。</span></article>
        </section>
        <article class="section-card" id="openManualCard" style="cursor:pointer;"><div class="section-head"><strong>最新发布</strong><span class="badge">V1.0</span></div><span>2026 春季渠道商品手册已发布，包含封面、总览、商品详情和分享页。</span></article>
        <article class="section-card"><div class="section-head"><strong>快捷入口</strong><span class="badge">常用</span></div><div class="chips" style="margin-top:10px;"><button class="chip" data-jump="products">常温休食</button><button class="chip" data-jump="products">冻品休食</button><button class="chip" data-jump="products">餐饮冷冻</button></div></article>
      `;
      document.getElementById("openManualCard").addEventListener("click", () => switchView("manual"));
      [...document.querySelectorAll("[data-jump='products']")].forEach(button => button.addEventListener("click", () => switchView("products")));
    }

    function renderManual() {
      document.getElementById("view-manual").innerHTML = `
        <article class="section-card"><div class="section-head"><strong>2026 春季渠道商品手册</strong><span class="badge">已发布</span></div><span>品牌背书、供应链能力、渠道总览、重点商品详情、分享页。</span></article>
        <section class="section-list">
          <article class="section-card" data-go="products" style="cursor:pointer;"><strong>Part 1 线上渠道</strong><span>冷藏即食、常温休食、餐饮冷冻。</span></article>
          <article class="section-card" data-go="products" style="cursor:pointer;"><strong>Part 2 线下渠道</strong><span>分场景、分利润、分规格推荐商品组合。</span></article>
          <article class="section-card" data-go="detail" style="cursor:pointer;"><strong>Part 3 重点 SKU 详情</strong><span>带卖点、适用场景、规格和建议售价。</span></article>
        </section>
      `;
      [...document.querySelectorAll("[data-go]")].forEach(card => card.addEventListener("click", () => switchView(card.dataset.go)));
    }

    function renderProducts() {
      const filterValues = ["全部", "常温休食", "冻品休食", "餐饮冷冻"];
      const filtered = activeFilter === "全部" ? products : products.filter(item => item.tag1 === activeFilter);
      document.getElementById("view-products").innerHTML = `
        <div class="search">搜索商品名称 / 口味 / 规格</div>
        <div class="chips">${filterValues.map(value => `<button class="chip ${value === activeFilter ? "active" : ""}" data-filter="${value}">${value}</button>`).join("")}</div>
        <section class="product-list">
          ${filtered.map(item => `
            <article class="product-card" data-product="${item.id}">
              <div class="product-thumb" style="background-image:url('${item.cover}')"></div>
              <div class="product-meta">
                <strong>${item.name}</strong>
                <span>${item.selling}</span>
                <div class="tag-row"><span class="tag">${item.tag1}</span><span class="tag">${item.tag2}</span><span class="tag">${item.spec}</span></div>
              </div>
            </article>`).join("")}
        </section>
      `;
      [...document.querySelectorAll("[data-filter]")].forEach(button => button.addEventListener("click", () => { activeFilter = button.dataset.filter; renderProducts(); }));
      [...document.querySelectorAll("[data-product]")].forEach(card => {
        card.addEventListener("click", () => {
          detailProduct = products.find(item => item.id === card.dataset.product);
          switchView("detail");
        });
      });
    }

    function renderDetail() {
      document.getElementById("view-detail").innerHTML = `
        <div class="detail-cover" style="background-image:url('${detailProduct.cover}')"></div>
        <article class="detail-card">
          <p class="detail-title">${detailProduct.name}</p>
          <div class="tag-row" style="margin:12px 0;"><span class="tag">${detailProduct.tag1}</span><span class="tag">${detailProduct.tag2}</span><span class="tag">${detailProduct.spec}</span></div>
          <div class="detail-copy">${detailProduct.selling}</div>
        </article>
        <section class="info-grid">
          <article class="info-item"><small>销售适用场景</small><div>${detailProduct.scene}</div></article>
          <article class="info-item"><small>保质期</small><div>${detailProduct.shelfLife}</div></article>
          <article class="info-item"><small>建议售价</small><div>￥${detailProduct.price}</div></article>
          <article class="info-item"><small>产品开发原因</small><div>${detailProduct.story}</div></article>
        </section>
        <button class="action-btn" id="goShareBtn">分享给客户</button>
      `;
      document.getElementById("goShareBtn").addEventListener("click", () => switchView("share"));
    }

    function renderShare() {
      document.getElementById("view-share").innerHTML = `
        <section class="share-banner"><strong style="display:block; font-size:24px; margin-bottom:8px;">一键分享商品手册</strong><span style="line-height:1.8; display:block;">支持整本手册转发，也支持单商品页分享，方便销售现场继续跟进。</span></section>
        <article class="share-card"><strong>当前分享对象</strong><span>${detailProduct.name} · ${detailProduct.spec} · ${detailProduct.tag1}</span></article>
        <div class="share-actions">
          <button class="action-btn">复制客户链接</button>
          <button class="action-btn">生成二维码海报</button>
          <button class="action-btn">转发微信好友</button>
          <button class="action-btn" id="backToDetailBtn">返回商品详情</button>
        </div>
      `;
      document.getElementById("backToDetailBtn").addEventListener("click", () => switchView("detail"));
    }

    function updateInsight() {
      const current = routes.find(item => item.key === activeRoute);
      insightTitle.textContent = current.title;
      insightCopy.textContent = current.insight;
      const detailLabel = activeRoute === "detail" || activeRoute === "share" ? detailProduct.name : "2026 春季渠道商品手册";
      insightCard.innerHTML = `<strong>当前动作</strong><span>${current.desc}</span><span style="display:block; margin-top:8px;">当前对象：${detailLabel}</span>`;
    }

    function switchView(view) {
      activeRoute = view;
      document.querySelectorAll(".view").forEach(node => node.classList.remove("active"));
      document.querySelector(`#view-${view}`).classList.add("active");
      document.querySelectorAll(".tab").forEach(tab => {
        const match = (view === "detail" && tab.dataset.view === "products") || (view === "share" && tab.dataset.view === "share") || tab.dataset.view === view;
        tab.classList.toggle("active", match);
      });
      renderRoutes();
      updateInsight();
    }

    document.getElementById("tabbar").addEventListener("click", event => {
      const target = event.target.closest(".tab");
      if (!target) return;
      switchView(target.dataset.view);
    });

    document.getElementById("playFlow").addEventListener("click", () => {
      if (timer) clearInterval(timer);
      const order = ["home", "manual", "products", "detail", "share"];
      let index = 0;
      switchView(order[index]);
      timer = setInterval(() => {
        index += 1;
        if (index >= order.length) { clearInterval(timer); timer = null; return; }
        switchView(order[index]);
      }, 1400);
    });

    document.getElementById("resetFlow").addEventListener("click", () => {
      if (timer) clearInterval(timer);
      timer = null;
      activeFilter = "全部";
      detailProduct = products[0];
      renderProducts();
      renderDetail();
      renderShare();
      switchView("home");
    });

    renderRoutes();
